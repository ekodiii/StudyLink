<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            background: #fafafa;
            color: #1a1a1a;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            background: #f0f0f0;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .status.connected { background: #e8f5e9; color: #2e7d32; }
        .status.disconnected { background: #fff3e0; color: #e65100; }
        .user-info {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .sync-time { color: #666; font-size: 12px; }
        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-danger { background: #fee2e2; color: #dc2626; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>StudyLink</h1>
    </div>

    <div id="logged-out" class="hidden">
        <div class="status disconnected">Not signed in. Sign in to sync your Canvas assignments.</div>
        <button class="btn-primary" id="btn-google-signin">Sign in with Google</button>
        <button class="btn-secondary" id="btn-apple-signin">Sign in with Apple</button>
    </div>

    <div id="logged-in" class="hidden">
        <div class="status connected">
            <div class="user-info" id="display-user"></div>
            <div class="sync-time" id="display-sync"></div>
        </div>
        <button class="btn-primary" id="btn-sync">Sync Now</button>
        <button class="btn-danger" id="btn-signout">Sign Out</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
